<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Float Plan</title>
    <style>
        #pdf-container {
            position: relative;
            width: 80%;
            margin: auto;
            border: 1px solid #ccc;
        }
        #pdf-canvas {
            display: block;
        }
        .annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* Ensures annotations do not interfere with mouse events */
        }
    </style>
</head>
<body style="background-color: #4978ba;">
    <h1>Complete Your Float Plan</h1>
    {% load static %}
    <div id="pdf-container">
        <canvas id="pdf-canvas"></canvas>
        <div id="annotation-layer" class="annotationLayer"></div>
    </div>
    <button id="save-btn">Save and Submit</button>

    <!-- Load PDF.js as an ES6 module -->
    <script type="module">
        import { getDocument, GlobalWorkerOptions } from "{% static 'js/pdf.mjs' %}";

        GlobalWorkerOptions.workerSrc = "{% static 'js/pdf.worker.mjs' %}";

        const pdfUrl = "{% static 'pdf/Float_plan_fillable.pdf' %}";
        const canvas = document.getElementById('pdf-canvas');
        const annotationLayerDiv = document.getElementById('annotation-layer');
        const ctx = canvas.getContext('2d');

        getDocument(pdfUrl).promise.then((pdf) => {
            pdf.getPage(1).then((page) => {
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                // Render the PDF page
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport,
                };
                const renderTask = page.render(renderContext);

                // Render the annotations (form fields)
                renderTask.promise.then(() => {
                    pdfjsLib.AnnotationLayerBuilder.create({
                        div: annotationLayerDiv,
                        page: page,
                        viewport: viewport,
                        linkService: new pdfjsLib.SimpleLinkService(),
                    }).render();
                });
            });
        });
    </script>
</body>
</html>
