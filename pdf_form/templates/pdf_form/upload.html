<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Float Plan</title>
</head>
<body>
    <h1>Upload Completed Float Plan</h1>
    <form action="{% url 'upload_filled_plan' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="completed_pdf">Completed Float Plan (PDF):</label>
        <input type="file" id="completed_pdf" name="completed_pdf" accept="application/pdf" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
