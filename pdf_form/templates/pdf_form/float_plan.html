<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Float Plan</title>
</head>
<body>
    <h1>Fill Out the Float Plan</h1>

    <!-- Display the PDF (user can view/download it) -->
    <iframe src="{{ pdf_url }}" width="100%" height="600px"></iframe>

    <!-- Form to upload the completed PDF -->
    <form action="{{ submit_url }}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="completed_pdf">Upload Completed Float Plan:</label>
        <input type="file" id="completed_pdf" name="completed_pdf" accept="application/pdf" required>
        <button type="submit">Submit Float Plan</button>
    </form>
</body>
</html>
